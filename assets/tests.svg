<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 420" font-family="SFMono-Regular, Menlo, Consolas, monospace" font-size="12.5">
  <style>
    .line { opacity: 0; animation: appear 0.15s ease-out forwards; }
    @keyframes appear { to { opacity: 1; } }
    .cursor { animation: blink 1s steps(1) infinite 8s; opacity: 0; }
    @keyframes blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
    text { fill: #c9d1d9; }
    .p { fill: #7ee787; } .d { fill: #8b949e; } .ok { fill: #7ee787; }
  </style>
  <rect width="740" height="420" rx="10" fill="#0d1117" stroke="#30363d"/>
  <circle cx="22" cy="21" r="6" fill="#ff5f57"/>
  <circle cx="42" cy="21" r="6" fill="#febc2e"/>
  <circle cx="62" cy="21" r="6" fill="#28c840"/>
  <text x="370" y="26" text-anchor="middle" class="d" font-size="12">flash-attention-cuda — make test (no GPU required)</text>
  <line x1="0" y1="40" x2="740" y2="40" stroke="#30363d"/>
  <g>
    <text x="20" y="66"  class="line" style="animation-delay:.4s"><tspan class="p">$</tspan> make test</text>
    <text x="20" y="88"  class="line d" style="animation-delay:1.1s">c++ -std=c++17 -O2 -Wall -Wextra ... -o build/test_cpu</text>
    <text x="20" y="112" class="line" style="animation-delay:1.9s">flash_cpu vs ref           B=1 H=1 N=64  d=32 <tspan class="ok">ok</tspan> O err 1.31e-06</text>
    <text x="20" y="134" class="line" style="animation-delay:2.3s">flash_cpu vs ref (causal)  B=1 H=1 N=64  d=32 <tspan class="ok">ok</tspan> O err 1.31e-06</text>
    <text x="20" y="156" class="line" style="animation-delay:2.7s">flash_cpu vs ref           B=2 H=3 N=128 d=64 <tspan class="ok">ok</tspan> O err 3.34e-06</text>
    <text x="20" y="178" class="line" style="animation-delay:3.1s">flash_cpu vs ref (causal)  B=2 H=3 N=128 d=64 <tspan class="ok">ok</tspan> O err 3.10e-06</text>
    <text x="20" y="200" class="line" style="animation-delay:3.5s">flash_cpu vs ref           B=1 H=2 N=257 d=64 <tspan class="ok">ok</tspan> O err 4.05e-06</text>
    <text x="20" y="222" class="line" style="animation-delay:3.9s">flash_cpu vs ref (causal)  B=1 H=2 N=257 d=64 <tspan class="ok">ok</tspan> O err 3.34e-06</text>
    <text x="20" y="244" class="line" style="animation-delay:4.3s">flash_cpu vs ref           B=1 H=1 N=33  d=64 <tspan class="ok">ok</tspan> O err 2.26e-06</text>
    <text x="20" y="266" class="line" style="animation-delay:4.7s">flash_cpu vs ref (causal)  B=1 H=1 N=33  d=64 <tspan class="ok">ok</tspan> O err 2.26e-06</text>
    <text x="20" y="288" class="line" style="animation-delay:5.1s">flash_cpu vs ref           B=2 H=2 N=300 d=32 <tspan class="ok">ok</tspan> O err 2.62e-06</text>
    <text x="20" y="310" class="line" style="animation-delay:5.5s">flash_cpu vs ref (causal)  B=2 H=2 N=300 d=32 <tspan class="ok">ok</tspan> O err 2.86e-06</text>
    <text x="20" y="336" class="line" style="animation-delay:6.3s"><tspan class="ok">all passed</tspan> <tspan class="d">— ragged tile boundaries, causal masks, both head dims</tspan></text>
    <text x="20" y="366" class="line" style="animation-delay:7.2s"><tspan class="d">same recurrence the CUDA kernel runs; nvcc compile gated in CI</tspan></text>
    <text x="20" y="392" class="line" style="animation-delay:7.8s"><tspan class="p">$</tspan> <tspan class="cursor">█</tspan></text>
  </g>
</svg>
