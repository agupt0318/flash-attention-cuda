<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 500" font-family="SFMono-Regular, Menlo, Consolas, monospace">
  <style>
    text { fill: #c9d1d9; font-size: 13px; }
    .dim { fill: #8b949e; font-size: 12px; }
    .grn { fill: #7ee787; }
    .blu { fill: #79c0ff; }
    .yel { fill: #e3b341; }
    .strip { fill: #161b22; stroke: #30363d; }
    /* the streaming K/V tile window: 4 stops down the strip, 2.4s each */
    .win { animation: slide 9.6s steps(1) infinite; }
    @keyframes slide {
      0%   { transform: translateY(0px); }
      25%  { transform: translateY(80px); }
      50%  { transform: translateY(160px); }
      75%  { transform: translateY(240px); }
    }
    /* per-phase labels/arrows: visible only during their quarter */
    .p0, .p1, .p2, .p3 { opacity: 0; animation: 9.6s steps(1) infinite; }
    .p0 { animation-name: ph0; } .p1 { animation-name: ph1; }
    .p2 { animation-name: ph2; } .p3 { animation-name: ph3; }
    @keyframes ph0 { 0%,24.9% { opacity: 1; } 25%,100% { opacity: 0; } }
    @keyframes ph1 { 25%,49.9% { opacity: 1; } 0%,24.9%,50%,100% { opacity: 0; } }
    @keyframes ph2 { 50%,74.9% { opacity: 1; } 0%,49.9%,75%,100% { opacity: 0; } }
    @keyframes ph3 { 75%,99.9% { opacity: 1; } 0%,74.9% { opacity: 0; } }
    /* output tile sharpens as tiles fold in */
    .o { animation: fill 9.6s steps(1) infinite; }
    @keyframes fill {
      0% { opacity: .25; } 25% { opacity: .5; } 50% { opacity: .75; } 75% { opacity: 1; }
    }
    .pulse { animation: pulse 2.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: .35; } 50% { opacity: 1; } }
  </style>

  <rect width="920" height="500" rx="10" fill="#0d1117" stroke="#30363d"/>
  <text x="30" y="36" font-size="15">FlashAttention forward — one query tile's view</text>
  <text x="30" y="56" class="dim">K and V stream through SRAM in tiles; scores exist one register at a time</text>

  <!-- Q strip: this CTA's tile pinned in registers -->
  <text x="60" y="105">Q</text>
  <rect x="40" y="115" width="60" height="320" class="strip"/>
  <rect x="40" y="115" width="60" height="80" fill="#1f6feb55" stroke="#79c0ff"/>
  <text x="20" y="90" class="blu" font-size="12">tile in registers (one thread per row)</text>

  <!-- K and V strips with streaming window -->
  <text x="205" y="105">K</text>
  <rect x="185" y="115" width="60" height="320" class="strip"/>
  <g class="win"><rect x="185" y="115" width="60" height="80" fill="#23863655" stroke="#7ee787"/></g>
  <text x="330" y="105">V</text>
  <rect x="310" y="115" width="60" height="320" class="strip"/>
  <g class="win"><rect x="310" y="115" width="60" height="80" fill="#23863655" stroke="#7ee787"/></g>
  <text x="185" y="460" class="grn" font-size="12">tile j streams: HBM → SRAM, loaded once</text>

  <!-- arrows K/V -> SRAM -->
  <g class="pulse">
    <path d="M 372 275 H 430" stroke="#7ee787" stroke-width="2" fill="none"/>
    <path d="M 430 271 l 8 4 -8 4 z" fill="#7ee787"/>
  </g>

  <!-- SRAM box -->
  <rect x="445" y="150" width="250" height="250" rx="8" fill="#161b22" stroke="#e3b341"/>
  <text x="470" y="178" class="yel">on-chip SRAM / registers</text>
  <text x="470" y="215" class="p0">j=0   s = q·k / √d</text>
  <text x="470" y="215" class="p1">j=1   s = q·k / √d</text>
  <text x="470" y="215" class="p2">j=2   s = q·k / √d</text>
  <text x="470" y="215" class="p3">j=3   s = q·k / √d</text>
  <text x="470" y="248" class="dim">m′ = max(m, s)</text>
  <text x="470" y="274" class="dim">ℓ  = ℓ·e^(m−m′) + e^(s−m′)</text>
  <text x="470" y="300" class="dim">acc = acc·e^(m−m′) + e^(s−m′)·v</text>
  <text x="470" y="345" class="p0">m=<tspan class="grn">2.1</tspan>  ℓ=<tspan class="grn">11.7</tspan></text>
  <text x="470" y="345" class="p1">m=<tspan class="grn">2.8</tspan>  ℓ=<tspan class="grn">19.2</tspan></text>
  <text x="470" y="345" class="p2">m=<tspan class="grn">2.8</tspan>  ℓ=<tspan class="grn">27.5</tspan></text>
  <text x="470" y="345" class="p3">m=<tspan class="grn">3.4</tspan>  ℓ=<tspan class="grn">31.0</tspan></text>
  <text x="470" y="378" class="dim">running stats — history rescaled,</text>
  <text x="470" y="396" class="dim">never revisited</text>

  <!-- arrow SRAM -> O -->
  <g class="pulse">
    <path d="M 697 275 H 755" stroke="#79c0ff" stroke-width="2" fill="none"/>
    <path d="M 755 271 l 8 4 -8 4 z" fill="#79c0ff"/>
  </g>

  <!-- O strip -->
  <text x="790" y="105">O = acc / ℓ</text>
  <rect x="770" y="115" width="60" height="320" class="strip"/>
  <rect x="770" y="115" width="60" height="80" fill="#1f6feb" class="o"/>
  <text x="745" y="460" class="dim" font-size="12">exact after the last tile</text>

  <text x="30" y="487" class="dim">the N×N score matrix is never materialized — HBM sees Q, K, V once and O once</text>
</svg>
