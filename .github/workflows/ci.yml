name: ci
on: [push, pull_request]

jobs:
  cpu-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: reference vs tiled algorithm
        run: make test

  torch-cpu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install torch (cpu) + ninja
        run: pip install --index-url https://download.pytorch.org/whl/cpu torch && pip install ninja
      - name: trainable op -- gradcheck, grad parity vs f64, training loop
        run: cd pytorch && python3 test_train.py

  cuda-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install nvcc
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends nvidia-cuda-toolkit
      - name: compile kernels + drivers (no GPU needed)
        run: make cuda
      - name: dump SASS + ptxas stats for offline analysis
        run: make sass
      - uses: actions/upload-artifact@v4
        with:
          name: flash-fwd-sass
          path: build/flash_fwd.sass
