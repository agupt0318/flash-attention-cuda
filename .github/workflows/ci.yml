name: ci
on: [push, pull_request]

jobs:
  cpu-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: reference vs tiled algorithm
        run: make test

  cuda-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install nvcc
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends nvidia-cuda-toolkit
      - name: compile kernels + drivers (no GPU needed)
        run: make cuda
